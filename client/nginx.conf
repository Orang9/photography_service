server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Konfigurasi Gzip (Opsional, agar website lebih cepat)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location / {
        # INI KUNCINYA:
        # Coba cari file aslinya ($uri), kalau tidak ada cari foldernya ($uri/),
        # kalau tidak ada juga, kembalikan index.html (biar React/Vite yang handle routing)
        try_files $uri $uri/ /index.html;
    }

    # Cache untuk file statis (gambar, css, js) agar tidak didownload ulang terus menerus
    location ~* \.(?:ico|css|js|gif|jpe?g|png)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

